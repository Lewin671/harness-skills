interface:
  display_name: "Review-Fix Loop"
  short_description: "Anchored review-fix loops with multi-model reviewers and retry budget"
  default_prompt: "Use $review-fix-loop only when the environment can run isolated coding and review subagents for an explicit review -> triage -> fix -> verify loop. Require stable issue ids, concrete verification reruns, delegated-pass completion with full-scope confirmation, and close only after no accepted blocking or major issues remain, the updated result gets independent delegated review, the request is confirmed satisfied, and residual risks are recorded. When multiple models are available, assign different model families to each review pass for cross-validation. Retry failed delegated passes up to two more times (three total attempts) before replacing with a fresh subagent; prefer a different model on replacement. If replacement also fails, report the workflow as blocked."
