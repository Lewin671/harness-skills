interface:
  display_name: "Review-Fix Loop"
  short_description: "Anchored review-fix loops with isolated reviewers"
  default_prompt: "Use $review-fix-loop when a diff, patch, skill, doc, prompt, config, runbook, or other artifact needs an explicit review -> triage -> fix -> verify loop with isolated coding and review subagents, stable issue ids, concrete verification reruns, and a hard stop once no accepted blocking or major issues remain."
