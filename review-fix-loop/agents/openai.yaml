interface:
  display_name: "Review-Fix Loop"
  short_description: "Delegated review-fix loops with subagents"
  default_prompt: "Use $review-fix-loop when a diff, patch, skill, doc, prompt, config, runbook, or other in-flight artifact needs repeated review, triage, fix, and verification passes, and the environment can run isolated subagents for coding and review until no accepted blocking or major issues remain and any residual risks are explicit."
