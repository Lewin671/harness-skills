interface:
  display_name: "Shared CDP Browser"
  short_description: "Attach agents to one shared Chrome CDP instance"
  default_prompt: "Use the shared CDP browser skill to attach to the shared Chrome instance, launching it when needed, and run browser commands through the provided wrapper so multiple agents can work concurrently. Treat one SHARED_CDP_BROWSER_SESSION value as one browser workspace for your current task, not as a single-page limit: it is normal to open multiple tabs, inspect them with tab list, switch with tab <index>, and keep working in the same session. Create a new session only when you need isolation from other work, and close it with session close when finished."
