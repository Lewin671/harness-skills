interface:
  display_name: "Shared CDP Browser"
  short_description: "Attach agents to one shared Chrome CDP instance"
  default_prompt: "Use the shared CDP browser skill to attach to the shared Chrome instance, launching it when needed, and run browser commands through the provided wrapper so multiple agents can work concurrently. When you need an isolated workflow, create a leased session tab with session open, keep reusing the same SHARED_CDP_BROWSER_SESSION value, and close it with session close when finished."
